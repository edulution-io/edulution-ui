name: Build + Tests and Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

env:
  CI: true

jobs:
  prepare:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ github.token }}

      - name: Use Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.x

      - name: Cache Node.js modules
        uses: actions/cache@v4.3.0
        continue-on-error: true
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

  build-frontend:
    runs-on: ubuntu-24.04
    needs: prepare
    timeout-minutes: 15
    steps:
      - name: Generate Frontend Docker Tags
        id: generate_docker_tags_fe
        run: |
          docker_registry_path="ghcr.io/edulution-io/edulution-ui"
          docker_tags_fe="$docker_registry_path:$(echo ${{ github.ref }} | cut -d'/' -f3- | sed 's/[^a-z0-9_-]/-/gi')"
          if [[ ${{ github.ref }} = 'refs/heads/master' ]] || [[ ${{ github.ref }} =~ ^refs/tags/v.*$ ]]; then
            docker_tags_fe+=",$docker_registry_path:latest"
          fi
          echo "docker_tags_fe=$docker_tags_fe" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ github.token }}

      - name: Use Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.x

      - name: Restore cached Node.js modules
        uses: actions/cache@v4.3.0
        continue-on-error: true
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build Frontend
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: false
          tags: ${{ steps.generate_docker_tags_fe.outputs.docker_tags_fe }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-api:
    runs-on: ubuntu-24.04
    needs: prepare
    timeout-minutes: 15
    steps:
      - name: Generate API Docker Tags
        id: generate_docker_tags_api
        run: |
          docker_registry_path="ghcr.io/edulution-io/edulution-api"
          docker_tags_api="$docker_registry_path:$(echo ${{ github.ref }} | cut -d'/' -f3- | sed 's/[^a-z0-9_-]/-/gi')"
          if [[ ${{ github.ref }} = 'refs/heads/master' ]] || [[ ${{ github.ref }} =~ ^refs/tags/v.*$ ]]; then
            docker_tags_api+=",$docker_registry_path:latest"
          fi
          echo "docker_tags_api=$docker_tags_api" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ github.token }}

      - name: Use Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.x

      - name: Restore cached Node.js modules
        uses: actions/cache@v4.3.0
        continue-on-error: true
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Build Backend
        run: npm run build:api

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build docker image
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: ${{ steps.generate_docker_tags_api.outputs.docker_tags_api }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  checks:
    runs-on: ubuntu-24.04
    needs: prepare
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ github.token }}

      - name: Use Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.x

      - name: Restore cached Node.js modules
        uses: actions/cache@v4.3.0
        continue-on-error: true
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Run Checks
        run: |
          npm run check-circular-deps
          npm run check-translations
          npm run check-error-message-translations
          npx pretty-quick --check
          npm run lint

  test-api:
    runs-on: ubuntu-24.04
    needs: prepare
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ github.token }}

      - name: Use Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.x

      - name: Restore cached Node.js modules
        uses: actions/cache@v4.3.0
        continue-on-error: true
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Run API Tests
        run: npm run test -- --coverage --coverageReporters=json-summary --coverageReporters=lcov

      - name: Upload API coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: coverage/apps/api/
          retention-days: 7

      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage/apps/api/lcov.info
          flags: api
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-frontend:
    runs-on: ubuntu-24.04
    needs: prepare
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ github.token }}

      - name: Use Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.x

      - name: Restore cached Node.js modules
        uses: actions/cache@v4.3.0
        continue-on-error: true
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Run Frontend Tests
        run: npm run test:frontend -- --coverage

      - name: Upload Frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-frontend
          path: coverage/apps/frontend/
          retention-days: 7

      - name: Upload Frontend coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage/apps/frontend/lcov.info
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    runs-on: ubuntu-24.04
    needs: prepare
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ github.token }}

      - name: Use Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 22.x

      - name: Restore cached Node.js modules
        uses: actions/cache@v4.3.0
        continue-on-error: true
        with:
          path: |
            **/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: npx nx run e2e:e2e -- --shard=${{ matrix.shard }}/2
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_ADMIN_USER: ${{ secrets.E2E_ADMIN_USER }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_TEACHER_USER: ${{ secrets.E2E_TEACHER_USER }}
          E2E_TEACHER_PASS: ${{ secrets.E2E_TEACHER_PASS }}
          E2E_STUDENT_USER: ${{ secrets.E2E_STUDENT_USER }}
          E2E_STUDENT_PASS: ${{ secrets.E2E_STUDENT_PASS }}
          E2E_PARENT_USER: ${{ secrets.E2E_PARENT_USER }}
          E2E_PARENT_PASS: ${{ secrets.E2E_PARENT_PASS }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: apps/e2e/playwright-report/
          retention-days: 14
